services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nxai
      POSTGRES_PASSWORD: nxai
      POSTGRES_DB: nxai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nxai -d nxai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  ingest:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "interfaces.telethon_workers.main"]
    restart: unless-stopped

  bots:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "interfaces.bots.main"]
    restart: unless-stopped

  api:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["uvicorn", "interfaces.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    restart: unless-stopped

  scheduler:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "scheduler.py"]
    restart: unless-stopped

volumes:
  postgres_data:
