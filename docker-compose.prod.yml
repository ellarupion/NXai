# Прод-стек — самостоятельный файл, а не override поверх docker-compose.yml
# (тот же resaon, что в NX: override'ы Compose склеивают list-поля вроде
# ports, и порты БД/Redis из dev-файла продолжили бы публиковаться наружу).
#
# nginx/TLS/веб-панель здесь пока нет — React-шелл переносится из NX и
# дособирается в ROADMAP.md Phase 1+; до этого панель доступна только через
# `api` напрямую (или SSH-туннель на порт 8000), без публичного домена.
#
# Запуск: docker compose -f docker-compose.prod.yml --env-file .env up -d --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nxai
      POSTGRES_PASSWORD: nxai
      POSTGRES_DB: nxai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nxai -d nxai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  ingest:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "interfaces.telethon_workers.main"]
    restart: unless-stopped

  bots:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "interfaces.bots.main"]
    restart: unless-stopped

  api:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["uvicorn", "interfaces.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    restart: unless-stopped

  scheduler:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "scheduler.py"]
    restart: unless-stopped

volumes:
  postgres_data:
