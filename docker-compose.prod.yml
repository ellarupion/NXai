# Прод-стек — самостоятельный файл, а не override поверх docker-compose.yml
# (тот же resaon, что в NX: override'ы Compose склеивают list-поля вроде
# ports, и порты БД/Redis из dev-файла продолжили бы публиковаться наружу).
#
# nginx/TLS здесь нет — на одном VPS рядом с другим проектом (см. DEPLOY.md
# "Несколько проектов на одном VPS") TLS-терминацию и роутинг по домену берёт
# на себя ОДИН общий nginx (например, уже существующий у соседнего проекта),
# а `api` подключается к нему через внешнюю docker-сеть `edge`, не публикуя
# порт наружу. React-панель для NXai ещё не собрана (ROADMAP.md Phase 1+) —
# до этого через ai.<домен> доступен только сам API.
#
# Запуск: docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# Сеть edge должна существовать до первого запуска: docker network create edge

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nxai
      POSTGRES_PASSWORD: nxai
      POSTGRES_DB: nxai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nxai -d nxai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  ingest:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "interfaces.telethon_workers.main"]
    restart: unless-stopped

  bots:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "interfaces.bots.main"]
    restart: unless-stopped

  api:
    build: .
    container_name: nxai-api
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["uvicorn", "interfaces.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    # Порт наружу НЕ публикуется — общий nginx (см. DEPLOY.md) достаёт до
    # контейнера по имени nxai-api через сеть edge. Для отладки без домена
    # можно временно раскомментировать "127.0.0.1:8000:8000" (не 0.0.0.0!).
    networks:
      - default
      - edge
    restart: unless-stopped

  scheduler:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "scheduler.py"]
    restart: unless-stopped

networks:
  default:
  edge:
    external: true

volumes:
  postgres_data:
