# Прод-стек — самостоятельный файл, а не override поверх docker-compose.yml
# (override'ы Compose склеивают list-поля вроде ports, и порты БД/Redis из
# dev-файла продолжили бы публиковаться наружу даже после "прод"-переопределения).
#
# Отдельный VPS только под NXai — свой nginx+certbot, без совместного входа с
# другим проектом (см. DEPLOY.md; более ранняя версия этого файла была под
# сценарий "на одном VPS с другим проектом", тот вариант остался в истории git,
# если понадобится снова).
#
# Запуск: docker compose -f docker-compose.prod.yml --env-file .env up -d --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nxai
      POSTGRES_PASSWORD: nxai
      POSTGRES_DB: nxai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nxai -d nxai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  ingest:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "interfaces.telethon_workers.main"]
    restart: unless-stopped

  bots:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "interfaces.bots.main"]
    restart: unless-stopped

  api:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["uvicorn", "interfaces.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  scheduler:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "scheduler.py"]
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Сертификат кладётся сюда вручную/через certs-sync (см. DEPLOY.md) —
      # nginx.conf ссылается на фиксированные fullchain.pem/privkey.pem
      # независимо от домена.
      - ./certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
    restart: unless-stopped

  # Не часть обычного `up` (profile tools) — разовая/периодическая задача, не
  # долгоживущий сервис. Запуск: см. DEPLOY.md.
  #   docker compose -f docker-compose.prod.yml --profile tools run --rm certbot certonly ...
  #   docker compose -f docker-compose.prod.yml --profile tools run --rm certbot renew ...
  certbot:
    image: certbot/certbot
    profiles: ["tools"]
    volumes:
      - certbot_letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: certbot

  # Переносит fullchain.pem/privkey.pem из тома certbot'а в ./certs (откуда их
  # реально читает nginx, см. deploy/nginx/nginx.conf) — нужен домен через
  # -e DOMAIN=..., см. DEPLOY.md.
  certs-sync:
    image: alpine
    profiles: ["tools"]
    volumes:
      - certbot_letsencrypt:/etc/letsencrypt:ro
      - ./certs:/out
    entrypoint: sh
    command:
      - -c
      - cp /etc/letsencrypt/live/$$DOMAIN/fullchain.pem /etc/letsencrypt/live/$$DOMAIN/privkey.pem /out/

volumes:
  postgres_data:
  certbot_webroot:
  certbot_letsencrypt:
