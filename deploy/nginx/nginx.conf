# Прод-edge: TLS-терминация и реверс-прокси на api. server_name "_" —
# catch-all, не завязан на конкретный домен (сам домен используется только
# при выпуске сертификата, см. DEPLOY.md) — тот же паттерн, что у NX.
#
# В отличие от NX этот файл НЕ копируется в образ на этапе сборки — он
# смонтирован как volume (см. docker-compose.prod.yml), поэтому правки
# подхватываются через `docker compose exec nginx nginx -s reload`, без
# пересборки образа.
#
# Пути к сертификатам фиксированы и не зависят от домена — в DEPLOY.md
# показано, как положить туда сертификат от certbot.

server {
    listen 80;
    server_name _;

    # certbot (webroot-режим) кладёт challenge-файлы сюда при выпуске/продлении
    # сертификата — см. DEPLOY.md. Этот location должен остаться доступным по
    # HTTP, редирект ниже его не перехватывает.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 4m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Vite собран с VITE_API_URL=/api (см. web/Dockerfile) — trailing slash
    # здесь и в proxy_pass обязателен: nginx заменяет ИМЕННО совпавший префикс
    # "/api/" на "/" при проксировании, /api/themes уходит в api как /themes.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: неизвестные пути (client-side роутинг react-router) отдаём как
    # index.html, а не 404 — иначе прямой переход по ссылке на /themes ломался бы.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
